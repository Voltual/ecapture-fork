name: Release
on:
  push:
    branches:
      - master
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-on-ubuntu2204:
    runs-on: ubuntu-22.04
    name: release Linux/Android Version (amd64/arm64)
    steps:
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.6'

      - name: Check Release Type
        id: release_type
        run: |
          TAG_NAME=${{ github.ref_name }}
          if [[ "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "IS_PRERELEASE=false" >> $GITHUB_OUTPUT
          elif [[ "$TAG_NAME" =~ (alpha|beta|rc) ]]; then
            echo "IS_PRERELEASE=true" >> $GITHUB_OUTPUT
          else
            echo "IS_PRERELEASE=false" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Install Compilers
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            build-essential \
            pkgconf \
            libelf-dev \
            llvm-14 \
            clang-14 \
            linux-tools-common \
            gcc \
            gcc-aarch64-linux-gnu \
            libpcap-dev
          
          # 建立工具软链接
          for tool in "clang" "llc" "llvm-strip" "bpftool"
          do
            sudo rm -f /usr/bin/$tool
            sudo ln -s /usr/bin/$tool-14 /usr/bin/$tool || true
          done
        shell: bash

      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      # 关键步骤：处理你提供的 kheaders.tar.xz
      # 假设该文件存放在仓库根目录，或者通过其他方式下载
      - name: Prepare Custom Kernel Headers
        id: kernel_headers
        run: |
          if [ -f "./kheaders.tar.xz" ]; then
            echo "✅ Found custom kheaders.tar.xz"
            mkdir -p ${{ github.workspace }}/custom_headers
            tar -xvf kheaders.tar.xz -C ${{ github.workspace }}/custom_headers
            
            # 自动寻找包含 Makefile 的目录作为源码根目录
            REAL_PATH=$(find ${{ github.workspace }}/custom_headers -name Makefile -exec dirname {} + | head -n 1)
            echo "LINUX_SOURCE_PATH=$REAL_PATH" >> $GITHUB_ENV
            echo "HAS_CUSTOM_HEADERS=true" >> $GITHUB_OUTPUT
            
            # 执行内核头文件预处理（对应 Makefile 中的 prepare 目标）
            cd $REAL_PATH
            # 针对你的目标架构执行 prepare，这里以 arm64 为例
            # 如果是 Android 环境，可能需要特定的 ARCH 参数
            make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- prepare
          else
            echo "⚠️ kheaders.tar.xz not found in root, falling back to generic build"
            echo "HAS_CUSTOM_HEADERS=false" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Release arm64 (Non-CO-RE / nocore)
        if: steps.kernel_headers.outputs.HAS_CUSTOM_HEADERS == 'true'
        run: |
          make clean
          # 使用 nocore 目标编译
          # 它会使用我们设置好的 LINUX_SOURCE_PATH 环境变量
          CROSS_ARCH=arm64 SNAPSHOT_VERSION=${{ github.ref_name }} make nocore
          
          # 将生成的二进制重命名，方便区分
          mv bin/ecapture bin/ecapture-${{ github.ref_name }}-linux-arm64-nocore
        shell: bash

      # 如果没有自定义头文件，则走原有的 release 流程（依赖 BTF）
      - name: Standard Release amd64
        if: steps.kernel_headers.outputs.HAS_CUSTOM_HEADERS == 'false'
        run: |
          make clean
          make -f builder/Makefile.release release SNAPSHOT_VERSION=${{ github.ref_name }}

      - name: Standard Release arm64
        if: steps.kernel_headers.outputs.HAS_CUSTOM_HEADERS == 'false'
        run: |
          make clean
          CROSS_ARCH=arm64 make -f builder/Makefile.release release SNAPSHOT_VERSION=${{ github.ref_name }}

      - name: Publish to GitHub Releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IS_PRERELEASE: ${{ steps.release_type.outputs.IS_PRERELEASE }}
        run: |
          # 使用 gh 命令行工具发布 bin/ 目录下的所有文件
          TAG=${{ github.ref_name }}
          gh release create $TAG bin/ecapture* \
            --title "Release $TAG" \
            --notes-file bin/release_notes.txt \
            $( [ "$IS_PRERELEASE" = "true" ] && echo "--prerelease" ) || \
          gh release upload $TAG bin/ecapture* --clobber
        shell: bash